bcr_test_module:
  module_path: ""
  matrix:
    platform:
      - debian10
      - ubuntu2004
    bazel: [7.x, 8.x]
  tasks:
    verify_targets:
      name: "Verify build targets"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - "//vivado:defs.bzl"
        - "//vivado:providers.bzl"
